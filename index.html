.transit-seg{display:flex;align-items:stretch;gap:0.6rem;padding:0.28rem 0;}.transit-line{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0;}.transit-dot{width:7px;height:7px;border-radius:50%;border:2px solid var(--accent-gold);flex-shrink:0;}.transit-dot.walk-dot{border-color:var(--text-gray);}.transit-connector{width:2px;flex:1;background:var(--accent-gold);margin:2px 0;min-height:14px;}.transit-connector.walk-connector{background:transparent;border-left:2px dashed var(--text-gray);width:0;margin-left:1px;}.transit-info{flex:1;padding-bottom:0.35rem;}.transit-line-name{font-size:0.8rem;font-weight:600;color:var(--text-light);}.transit-line-name.walk-name{color:var(--text-gray);font-weight:400;}.transit-stops{font-size:0.7rem;color:var(--text-gray);margin-top:0.1rem;}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(212,175,55,0.3);border-radius:50%;border-top-color:var(--accent-gold);animation:spin 0.8s linear infinite;}@keyframes spin{to{transform:rotate(360deg)}}
.leaflet-popup-content-wrapper{background:linear-gradient(135deg,#2d2d2d 0%,#1a1a1a 100%);color:var(--text-light);border:2px solid var(--accent-gold);border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,0.8);}.leaflet-popup-content{margin:0.75rem;font-family:"Noto Sans SC",sans-serif;}.leaflet-popup-tip{background:#2d2d2d;}
.popup-title{font-family:"Noto Serif SC",serif;font-size:0.95rem;font-weight:700;color:var(--accent-gold);margin-bottom:0.3rem;}.popup-address{font-size:0.75rem;color:var(--text-gray);margin-bottom:0.5rem;}.popup-btn{background:var(--accent-red);color:white;border:none;padding:0.45rem 0.9rem;cursor:pointer;font-family:"Noto Sans SC",sans-serif;font-weight:600;width:100%;transition:all 0.3s;font-size:0.8rem;}.popup-btn:hover{background:#a01828;}
@media(max-width:1200px){.detail-container{grid-template-columns:1fr;padding:1.3rem;}.sidebar{max-height:500px;}.wizard-two-col{grid-template-columns:1fr;}}
@media(max-width:768px){header{padding:0.9rem 1.3rem;}h1{font-size:1.4rem;letter-spacing:0.2rem;}.maps-section{padding:0 1.2rem 2.5rem;}.hero-section h2{font-size:1.9rem;}.create-container{padding:1.3rem;}.info-grid{grid-template-columns:1fr;}.detail-header{padding:0.7rem 1.2rem;gap:0.8rem;}}
</style></head><body>
<header><div class="header-content">
<div id="logo-area" onclick="showView('home')">
<h1>历史印记</h1>
<p class="subtitle">探寻历史 · 铭记过往</p>
</div>
<nav>
<button onclick="showView('home')">浏览地图</button>
<button onclick="requireLogin(showCreateMapView)">创建地图</button>
<div id="auth-area"></div>
</nav>
</div></header>
<div id="view-home">
<div class="hero-section">
<h2>人文地图平台</h2>
<p class="hero-subtitle">创建、分享和探索人文主题地图</p>
<div class="hero-btns">
<button class="btn-primary" onclick="requireLogin(showCreateMapView)">开始创建地图</button>
<button class="btn-secondary" onclick="startTour()">查看使用指南</button>
</div></div>
<div class="maps-section">
<h3 class="section-heading">地图广场</h3>
<div id="maps-grid" class="maps-grid"><div style="color:var(--text-gray);text-align:center;padding:3rem;grid-column:1/-1">正在加载...</div></div>
</div></div>
<div id="view-map-detail" style="display:none">
<div class="detail-header">
<button class="back-btn" onclick="showView('home')">← 返回广场</button>
<div id="detail-map-title">地图标题</div>
<div id="detail-map-meta"></div>
<button id="save-btn" class="save-btn" onclick="toggleSaveMap()">🤍 收藏</button>
</div>
<div class="detail-container">
<div class="map-section"><div id="map"></div><button class="map-fab" onclick="showRouteModal()">🗺 路线规划</button></div>
<div class="sidebar">
<div class="sidebar-tabs">
<button class="tab-btn active" id="tab-locations" onclick="switchTab('locations')">地点列表</button>
<button class="tab-btn" id="tab-comments" onclick="switchTab('comments')">地图评论</button>
</div>
<div id="panel-locations"><div id="locationList"></div></div>
<div id="panel-comments" style="display:none">
<div id="mapCommentsList"></div>
<div class="add-comment">
<div class="rating-select">评分：<span class="star-btn" onclick="setCommentRating(1)">★</span><span class="star-btn" onclick="setCommentRating(2)">★</span><span class="star-btn" onclick="setCommentRating(3)">★</span><span class="star-btn" onclick="setCommentRating(4)">★</span><span class="star-btn" onclick="setCommentRating(5)" style="opacity:1">★</span></div>
<textarea id="mapCommentText" placeholder="分享您对这张地图的感受..."></textarea>
<button onclick="submitMapComment()">发表评论</button>
</div></div>
</div></div></div>
<div id="view-create-map" style="display:none">
<div class="create-container">
<h2>创建地图</h2>
<div class="wizard-steps">
<div class="wizard-step-indicator active" id="wiz-ind-1">1. 基本信息</div>
<div class="wizard-step-indicator" id="wiz-ind-2">2. 添加地点</div>
<div class="wizard-step-indicator" id="wiz-ind-3">3. 预览发布</div>
</div>
<div id="wizard-step-1" class="wizard-panel active">
<div class="form-group"><label>地图名称 *</label><input type="text" id="wiz-title" placeholder="为您的地图取一个名字"></div>
<div class="form-group"><label>地图描述</label><textarea id="wiz-desc" placeholder="介绍这张地图的主题和内容"></textarea></div>
<div class="form-group"><label>主题</label><select id="wiz-theme"><option>人文历史</option><option>自然地理</option><option>城市记忆</option><option>美食文化</option><option>艺术创作</option><option>其他</option></select></div>
<div class="form-group"><label><input type="checkbox" id="wiz-public" checked style="width:auto;margin-right:0.4rem"> 公开此地图，让所有人可以浏览</label></div>
<div class="wizard-nav"><span></span><button class="btn-primary" onclick="wizardNext(1)">下一步：添加地点 →</button></div>
</div>
<div id="wizard-step-2" class="wizard-panel">
<div class="wizard-two-col">
<div class="wiz-form-col">
<input id="wiz-loc-name" placeholder="地点名称 *">
<div class="wiz-geocode-row"><input id="wiz-loc-address" placeholder="详细地址（必填，用于搜索坐标）"><button onclick="geocodeWizardAddress()">搜索坐标</button></div>
<div class="wiz-latlng-row"><input id="wiz-loc-lat" placeholder="纬度（自动填入）" type="number" step="0.00001"><input id="wiz-loc-lng" placeholder="经度（自动填入）" type="number" step="0.00001"></div>
<textarea id="wiz-loc-desc" placeholder="人文/历史介绍"></textarea>
<input id="wiz-loc-arch-style" placeholder="建筑风格（可选）">
<input id="wiz-loc-arch-year" placeholder="建筑年代（可选）">
<input id="wiz-loc-arch-builder" placeholder="设计/建造者（可选）">
<input id="wiz-loc-open-time" placeholder="开放时间（可选）">
<input id="wiz-loc-ticket" placeholder="票价（可选）">
<textarea id="wiz-loc-notes" placeholder="创作者个性说明（可选）"></textarea>
<button class="wiz-add-btn" onclick="addWizardLocation()">+ 添加此地点</button>
</div>
<div>
<p style="color:var(--text-gray);font-size:0.82rem;margin-bottom:0.5rem">预览地图（点击地图可选取坐标）</p>
<div id="create-map-preview"></div>
</div>
</div>
<div style="margin-top:1.5rem">
<p style="color:var(--accent-gold);font-size:0.85rem;margin-bottom:0.8rem">已添加的地点：</p>
<div id="wiz-location-list"></div>
</div>
<div class="wizard-nav"><button class="wizard-nav-btn" onclick="wizardBack(2)">← 上一步</button><button class="btn-primary" onclick="wizardNext(2)">下一步：预览发布 →</button></div>
</div>
<div id="wizard-step-3" class="wizard-panel">
<div id="wiz-preview-info"></div>
<div class="wizard-nav"><button class="wizard-nav-btn" onclick="wizardBack(3)">← 继续编辑</button><button class="btn-primary" onclick="publishMap()">发布地图 ✓</button></div>
</div>
</div></div>
<div id="routeModal" class="modal">
<div class="modal-content">
<div class="modal-header"><h2>路线规划</h2><button class="close-btn" onclick="closeModal('routeModal')">&times;</button></div>
<div class="modal-body">
<div class="route-controls">
<div class="section-title">选择游览地点</div>
<div class="checkbox-group" id="routeCheckboxes"></div>
<div class="section-title" style="margin-top:1.5rem">起点与终点</div>
<div class="info-grid">
<div><label class="info-label">起点位置</label>
<div style="display:flex;gap:0.5rem;margin-bottom:0.5rem"><label style="display:flex;align-items:center;gap:0.3rem"><input type="radio" name="startType" value="preset" checked onchange="toggleStartInput()"> 选择地点</label><label style="display:flex;align-items:center;gap:0.3rem"><input type="radio" name="startType" value="custom" onchange="toggleStartInput()"> 自定义地址</label></div>
<select id="startPoint" style="width:100%;padding:0.7rem;background:rgba(26,26,26,0.6);border:1px solid var(--border-color);color:var(--text-light)"><option value="">请选择起点</option></select>
<input type="text" id="customStartAddress" placeholder="输入起点地址" style="width:100%;padding:0.7rem;background:rgba(26,26,26,0.6);border:1px solid var(--border-color);color:var(--text-light);display:none"></div>
<div><label class="info-label">终点位置</label>
<div style="display:flex;gap:0.5rem;margin-bottom:0.5rem"><label style="display:flex;align-items:center;gap:0.3rem"><input type="radio" name="endType" value="preset" checked onchange="toggleEndInput()"> 选择地点</label><label style="display:flex;align-items:center;gap:0.3rem"><input type="radio" name="endType" value="custom" onchange="toggleEndInput()"> 自定义地址</label></div>
<select id="endPoint" style="width:100%;padding:0.7rem;background:rgba(26,26,26,0.6);border:1px solid var(--border-color);color:var(--text-light)"><option value="">请选择终点</option></select>
<input type="text" id="customEndAddress" placeholder="输入终点地址" style="width:100%;padding:0.7rem;background:rgba(26,26,26,0.6);border:1px solid var(--border-color);color:var(--text-light);display:none"></div>
</div>
<div class="section-title" style="margin-top:1.5rem">游览顺序</div>
<div style="display:flex;gap:1rem"><label><input type="radio" name="routeOrder" value="nearest" checked> 从近到远</label><label><input type="radio" name="routeOrder" value="farthest"> 从远到近</label></div>
<button id="generateRouteBtn" class="route-button" onclick="generateRoute()" style="margin-top:1.5rem">生成路线</button>
</div>
<div id="routeResult"></div>
</div></div></div>
<div id="loginModal" class="modal" style="display:none">
<div class="modal-content" style="max-width:480px">
<div class="modal-header"><h2 id="authModalTitle">登录</h2><button class="close-btn" onclick="closeModal('loginModal')">&times;</button></div>
<div class="modal-body">
<div class="form-group"><label>邮箱</label><input type="email" id="loginEmail" placeholder="请输入邮箱"></div>
<div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码（至少6位）"></div>
<div id="signupNameField" class="form-group" style="display:none"><label>昵称</label><input type="text" id="signupName" placeholder="请输入昵称"></div>
<button id="authSubmitBtn" onclick="handleAuth()" class="btn-primary" style="width:100%;margin-top:0.5rem">登录</button>
<div style="text-align:center;margin-top:1rem"><span style="color:var(--text-gray)" id="authSwitchText">还没有账号？</span><button onclick="switchAuthMode()" style="background:transparent;border:none;color:var(--accent-gold);cursor:pointer;text-decoration:underline" id="authSwitchBtn">注册</button></div>
</div></div></div>
<div id="tour-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9000;align-items:center;justify-content:center">
<div style="background:#2d2d2d;border:2px solid var(--accent-gold);border-radius:8px;padding:2rem;max-width:480px;width:90%;text-align:center">
<div id="tour-step-num" style="color:var(--text-gray);font-size:0.82rem;margin-bottom:0.5rem"></div>
<h3 id="tour-title" style="font-family:'Noto Serif SC',serif;color:var(--accent-gold);margin-bottom:1rem;font-size:1.3rem"></h3>
<p id="tour-content" style="color:var(--text-light);line-height:1.7;margin-bottom:1.5rem;font-size:0.92rem"></p>
<div style="display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap">
<button id="tour-prev" onclick="tourPrev()" style="display:none;background:transparent;border:1px solid var(--border-color);color:var(--text-light);padding:0.6rem 1.4rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif">上一步</button>
<button id="tour-next" onclick="tourNext()" style="background:var(--accent-red);color:white;border:none;padding:0.6rem 1.4rem;cursor:pointer;font-weight:600;font-family:'Noto Sans SC',sans-serif">下一步</button>
<button onclick="endTour()" style="background:transparent;border:1px solid var(--border-color);color:var(--text-gray);padding:0.6rem 1rem;cursor:pointer;font-family:'Noto Sans SC',sans-serif">跳过</button>
</div></div></div>

<script src="supabase-config.js"></script>
<script src="amap-config.js?v=4"></script>
<script>
const EXAMPLE_MAP_ID = '00000000-0000-0000-0000-000000000001';

const locations = [
  {id:1,sort_order:1,name:'汉口碉堡群',address:'江岸区惠济二路地铁D口东南50米',lat:30.6051,lng:114.2905,description:'这些碉堡建于1938年武汉会战期间，是当时国民政府为抵御日军进攻而修建的防御工事。碉堡群采用钢筋混凝土结构，墙体厚度达1米以上，设有射击孔和观察窗。这些军事遗迹见证了武汉会战的激烈战况，是研究抗战军事防御的重要实物资料。',arch_style:'军事防御建筑',arch_year:'1938年',arch_builder:'国民政府军事委员会',open_time:'全天开放(户外遗址)',ticket:'免费'},
  {id:2,sort_order:2,name:'王家墩公园',address:'江岸区万松街办事处清江路',lat:30.6015,lng:114.2725,description:'原为王家墩机场旧址。1938年国民政府迁至武汉后，这里成为中国空军抗战指挥中心。众多中国空军飞行员从这里起飞，与日军航空兵展开激烈空战。著名的武汉空战就以此为主要基地。现已改建为公园，但仍保留部分历史遗迹。',arch_style:'军用机场(已改建为公园)',arch_year:'1930年代',arch_builder:'国民政府航空委员会',open_time:'06:00-22:00',ticket:'免费'},
  {id:3,sort_order:3,name:'苏联空军烈士墓',address:'解放公园路42号解放公园内',lat:30.5969,lng:114.2923,description:'1938年，苏联政府派遣空军志愿队援华抗战，与中国空军并肩作战。在武汉保卫战中，15名苏联飞行员壮烈牺牲。烈士墓于1956年修建，墓碑上镌刻着烈士名字，见证了中苏两国人民在反法西斯战争中的深厚友谊。',arch_style:'纪念性建筑',arch_year:'1956年',arch_builder:'武汉市政府',open_time:'06:00-22:00',ticket:'免费'},
  {id:4,sort_order:4,name:'八路军武汉办事处旧址',address:'江岸区长春街57号',lat:30.5891,lng:114.2856,description:'1937年抗战全面爆发后，中国共产党在此设立八路军驻武汉办事处。周恩来、董必武、叶剑英等曾在此工作。办事处负责统战工作、宣传抗日、输送进步青年到延安等重要任务，是抗战时期中共在南方的重要据点。现为全国重点文物保护单位。',arch_style:'近代西式建筑',arch_year:'20世纪初',arch_builder:'不详',open_time:'09:00-17:00(周一闭馆)',ticket:'免费(需预约)'},
  {id:5,sort_order:5,name:'汉口新四军军部旧址',address:'江岸区胜利街332-352号',lat:30.5876,lng:114.2912,description:'1937年12月，新四军军部在此成立，叶挺任军长，项英任副军长。军部在此期间筹建新四军，整编南方八省游击队，开展抗日宣传。建筑群由多栋建筑组成，为典型的汉口近代里弄住宅，现保存完好。',arch_style:'近代里弄建筑',arch_year:'20世纪初',arch_builder:'不详',open_time:'09:00-17:00(周一闭馆)',ticket:'免费'},
  {id:6,sort_order:6,name:'江汉关大楼',address:'江汉区沿江大道129号',lat:30.5783,lng:114.2837,description:'建于1924年，是武汉的标志性建筑。抗战期间，江汉关见证了武汉会战的惨烈。大楼采用古典复兴式建筑风格，主体四层，钟楼高度46.3米。现为全国重点文物保护单位，内设江汉关博物馆。',arch_style:'古典复兴式建筑',arch_year:'1924年',arch_builder:'景明洋行设计',open_time:'09:00-17:00(周一闭馆)',ticket:'免费(需预约)'},
  {id:7,sort_order:7,name:'一元路小学',address:'江岸区一元路',lat:30.5923,lng:114.2867,description:'原为战时第一儿童临时保育会旧址。1938年3月，在宋美龄倡导下成立，邓颖超担任常务理事。保育会收容救济战区难童，高峰时收容儿童达3万余名，体现了国共合作、全民抗战的精神。',arch_style:'学校建筑',arch_year:'20世纪初',arch_builder:'不详',open_time:'仅外观参观',ticket:'不对外开放'},
  {id:8,sort_order:8,name:'武汉总商会',address:'江汉路商圈中山大道489号',lat:30.5812,lng:114.2798,description:'原汉口总商会旧址，也是文艺界抗敌协会旧址。1938年3月27日，中华全国文艺界抗敌协会在此宣告成立，集结了郭沫若、茅盾、巴金、冰心等众多文艺界名人。建筑为近代西式商业建筑。',arch_style:'近代西式商业建筑',arch_year:'1920年代',arch_builder:'汉口商会',open_time:'商业区，全天开放',ticket:'免费'},
  {id:9,sort_order:9,name:'日租界军官宿舍旧址',address:'江岸区胜利街262-272号',lat:30.5869,lng:114.2898,description:'原为日本租界内的军官宿舍，是日本侵华的历史罪证。建筑群反映了日本在华租界的建筑特色和侵略扩张的野心。抗战胜利后收回，这些建筑见证了中华民族从屈辱走向胜利的历程。',arch_style:'日式建筑',arch_year:'1920-1930年代',arch_builder:'日本租界当局',open_time:'居民区，仅外观参观',ticket:'免费'},
  {id:10,sort_order:10,name:'汉口慰安所旧址',address:'江汉区民权街积庆社区',lat:30.5834,lng:114.2756,description:'这是世界上现存的唯一完整日军慰安所旧址，是日军侵华罪行的铁证。建筑群保存了慰安所的原始格局，是日军强征慰安妇、实施性暴力犯罪的历史见证，具有重要的史料价值和警示意义。',arch_style:'近代里弄建筑',arch_year:'20世纪初',arch_builder:'不详',open_time:'需预约参观',ticket:'免费'},
  {id:11,sort_order:11,name:'史沫特莱旧居',address:'江岸区鄱阳街32号',lat:30.5898,lng:114.2889,description:'美国记者史沫特莱1938年在武汉的住所。她在武汉期间采访报道了八路军、新四军的抗战事迹，向世界传播了中国人民抗战的真实情况。建筑为典型的汉口近代里弄住宅，现保存基本完好。',arch_style:'近代里弄建筑',arch_year:'20世纪初',arch_builder:'不详',open_time:'居民区，仅外观参观',ticket:'免费'},

// Utility: format distance/time
function fmtDist(m) { return m>=1000?(m/1000).toFixed(1)+'km':m+'m'; }
function fmtTime(s) { const m=Math.round(s/60); return m>=60?Math.floor(m/60)+'h'+(m%60?m%60+'min':''):m+'min'; }

function calculateDistance(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

<script>
// ===== VIEW SWITCHING =====
const VIEWS = ['home','map-detail','create-map'];
function showView(name) {
  VIEWS.forEach(v => {
    const el = document.getElementById('view-'+v);
    if(el) el.style.display = (v===name)?'':'none';
  });
  if(name==='map-detail' && map) setTimeout(()=>map.invalidateSize(),100);
  if(name==='create-map') {
    setTimeout(()=>{ if(!mapPreview) initCreatePreviewMap(); else mapPreview.invalidateSize(); },150);
  }
  if(name==='home') loadHomePage();
  window.location.hash = name==='home'?'#home':'#'+name;
}

function showCreateMapView() {
  wizardStep=1; wizardLocations=[];
  document.querySelectorAll('.wizard-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.wizard-step-indicator').forEach(i=>i.classList.remove('active'));
  document.getElementById('wizard-step-1').classList.add('active');
  document.getElementById('wiz-ind-1').classList.add('active');
  ['wiz-title','wiz-desc'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('wiz-location-list').innerHTML='';
  showView('create-map');
}

function requireLogin(fn) {
  if(currentUser){ fn(); } else { showLoginModal(); }
}

// ===== AUTH =====
let authMode = 'login';

function showLoginModal() {
  authMode='login';
  document.getElementById('authModalTitle').textContent='登录';
  document.getElementById('authSubmitBtn').textContent='登录';
  document.getElementById('authSwitchText').textContent='还没有账号？';
  document.getElementById('authSwitchBtn').textContent='注册';
  document.getElementById('signupNameField').style.display='none';
  document.getElementById('loginModal').style.display='flex';
}
function switchAuthMode() {
  authMode = authMode==='login'?'signup':'login';
  const isLogin = authMode==='login';
  document.getElementById('authModalTitle').textContent=isLogin?'登录':'注册';
  document.getElementById('authSubmitBtn').textContent=isLogin?'登录':'注册';
  document.getElementById('authSwitchText').textContent=isLogin?'还没有账号？':'已有账号？';
  document.getElementById('authSwitchBtn').textContent=isLogin?'注册':'登录';
  document.getElementById('signupNameField').style.display=isLogin?'none':'block';
}
async function handleAuth() {
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  if(!email||!password){ alert('请填写邮箱和密码'); return; }
  const btn=document.getElementById('authSubmitBtn');
  btn.disabled=true; btn.textContent='请稍候...';
  let result;
  if(authMode==='signup'){
    const name=document.getElementById('signupName').value.trim()||'用户';
    result=await AuthSystem.signUp(email,password,name);
  } else {
    result=await AuthSystem.signIn(email,password);
  }
  btn.disabled=false; btn.textContent=authMode==='login'?'登录':'注册';
  if(result.success){
    closeModal('loginModal');
    document.getElementById('loginEmail').value='';
    document.getElementById('loginPassword').value='';
  } else {
    alert(result.error||'操作失败，请重试');
  }
}
async function handleSignOut() {
  await AuthSystem.signOut();
  currentUser=null;
  renderAuthArea(null);
}
function renderAuthArea(user) {
  const area=document.getElementById('auth-area');
  if(!area) return;
  if(user){
    area.innerHTML='<span style="color:var(--text-gray);font-size:0.82rem;margin-right:0.6rem">'+(user.user_metadata&&user.user_metadata.name?user.user_metadata.name:user.email)+'</span><button onclick="handleSignOut()" style="background:transparent;border:1px solid var(--border-color);color:var(--text-gray);padding:0.4rem 0.85rem;cursor:pointer;font-size:0.78rem;font-family:\'Noto Sans SC\',sans-serif">退出</button>';
  } else {
    area.innerHTML='<button onclick="showLoginModal()" style="background:transparent;border:1px solid var(--accent-gold);color:var(--accent-gold);padding:0.55rem 1.2rem;cursor:pointer;font-size:0.85rem;font-family:\'Noto Sans SC\',sans-serif">登录 / 注册</button>';
  }
}

// ===== HOME PAGE =====
async function loadHomePage() {
  const grid=document.getElementById('maps-grid');
  if(!grid) return;
  grid.innerHTML='<div style="color:var(--text-gray);text-align:center;padding:3rem;grid-column:1/-1">正在加载...</div>';
  let maps=[];
  if(window.MapSystem){
    const r=await MapSystem.getMaps(20);
    if(r.success) maps=r.maps||r.data;
  }
  if(!maps||maps.length===0){
    maps=[{id:EXAMPLE_MAP_ID,title:'武汉抗战旧址地图',description:'1937-1945年间，武汉作为战时首都和重要战场，留下了众多抗战遗迹。这些历史建筑和纪念地见证了中华民族抗击侵略的英勇历程。',theme:'人文历史',is_example:true,creator_name:'历史印记官方',saves:0,views:0,location_count:24}];
  }
  renderMapCards(maps);
}

const COVER_GRADIENTS=['linear-gradient(135deg,#c41e3a 0%,#8b1425 100%)','linear-gradient(135deg,#1a3a5c 0%,#2d5a8e 100%)','linear-gradient(135deg,#2d5a2d 0%,#4a8a4a 100%)','linear-gradient(135deg,#5a3a1a 0%,#8a6040 100%)','linear-gradient(135deg,#3a1a5c 0%,#6a3a8e 100%)'];

function renderMapCards(maps){
  const grid=document.getElementById('maps-grid');
  if(!grid) return;
  if(!maps||maps.length===0){
    grid.innerHTML='<div style="color:var(--text-gray);text-align:center;padding:3rem;grid-column:1/-1">暂无地图，成为第一个创建者吧！</div>';
    return;
  }
  grid.innerHTML=maps.map((m,i)=>{
    const grad=COVER_GRADIENTS[i%COVER_GRADIENTS.length];
    const badge=m.is_example?'<span class="example-badge">🏛 示范地图</span>':'';
    const desc=(m.description||'').length>60?(m.description||'').slice(0,60)+'...':m.description||'';
    const cnt=m.location_count||m.locations_count||'';
    return '<div class="map-card" onclick="openMap(\''+m.id+'\')">'
      +'<div class="map-card-cover" style="background:'+grad+'">'+badge+'</div>'
      +'<div class="map-card-body">'
      +'<div class="map-card-theme">'+(m.theme||'人文历史')+'</div>'
      +'<div class="map-card-title">'+escHtml(m.title||'')+'</div>'
      +'<div class="map-card-desc">'+escHtml(desc)+'</div>'
      +'<div class="map-card-meta">'
      +(cnt?'<span>📍 '+cnt+' 个地点</span>':'')
      +'<span>👁 '+(m.views||0)+'</span>'
      +'<span>🤍 '+(m.saves||0)+'</span>'
      +'<span>✍ '+(m.creator_name||'匿名')+'</span>'
      +'</div></div></div>';
  }).join('');
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function closeModal(id){ const el=document.getElementById(id); if(el) el.style.display='none'; }
</script>

<script>
// ===== MAP DETAIL =====
async function openMap(mapId) {
  currentMapId = mapId;
  showView('map-detail');

  // Load map info
  let mapInfo = null;
  if(window.MapSystem) {
    const r = await MapSystem.getMapById(mapId);
    if(r.success) mapInfo = r.map;
  }
  if(mapInfo) {
    document.getElementById('detail-map-title').textContent = mapInfo.title||'';
    document.getElementById('detail-map-meta').textContent = (mapInfo.creator_name||'') + (mapInfo.theme?' · '+mapInfo.theme:'');
  }

  // Load locations
  let locs = null;
  if(window.MapLocationSystem) {
    const r = await MapLocationSystem.getLocations(mapId);
    if(r.success && r.locations && r.locations.length>0) locs = r.locations;
  }
  if(!locs && mapId===EXAMPLE_MAP_ID) locs = locations;
  if(!locs) locs = [];
  currentLocations = locs;

  initDetailMap(locs);
  renderLocationList(locs);
  loadMapComments();
  updateSaveButton();
}

function initDetailMap(locs) {
  if(!map) {
    map = L.map('map', {zoomControl:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
  } else {
    markers.forEach(m=>m.remove());
    markers=[];
    if(routeLayer){ routeLayer.remove(); routeLayer=null; }
    if(transportRouteLayer){ transportRouteLayer.remove(); transportRouteLayer=null; }
  }
  if(!locs||locs.length===0){ map.setView([30.57,114.27],12); return; }

  const icon = L.divIcon({className:'',html:'<div style="background:var(--accent-red);color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.75rem;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.5)">#N</div>',iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-16]});

  locs.forEach((loc,idx)=>{
    const ic = L.divIcon({className:'',html:'<div style="background:var(--accent-red);color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.75rem;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.5)">'+(idx+1)+'</div>',iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-16]});
    const m = L.marker([loc.lat,loc.lng],{icon:ic})
      .addTo(map)
      .bindPopup('<div class="popup-title">'+escHtml(loc.name)+'</div><div class="popup-address">'+escHtml(loc.address||'')+'</div><button class="popup-btn" onclick="scrollToLocation(\''+loc.id+'\')">查看详情</button>');
    markers.push(m);
  });

  const bounds = L.latLngBounds(locs.map(l=>[l.lat,l.lng]));
  map.fitBounds(bounds, {padding:[40,40]});
  setTimeout(()=>map.invalidateSize(),200);
}

function scrollToLocation(locId) {
  const el = document.getElementById('loc-item-'+locId);
  if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); toggleLocationDetail(locId); }
  const tab = document.getElementById('tab-locations');
  if(tab&&!tab.classList.contains('active')) switchTab('locations');
}

function renderLocationList(locs) {
  const list = document.getElementById('locationList');
  if(!list) return;
  list.innerHTML = locs.map((loc,idx)=>
    '<div class="location-item" id="loc-item-'+loc.id+'">'
    +'<div class="location-header" onclick="toggleLocationDetail(\''+loc.id+'\')">'
    +'<span class="location-number">'+(idx+1)+'</span>'
    +'<div><div class="location-name">'+escHtml(loc.name)+'</div><div class="location-address">'+escHtml(loc.address||'')+'</div></div>'
    +'<span class="expand-icon" id="exp-'+loc.id+'">▶</span>'
    +'</div>'
    +'<div id="detail-panel-'+loc.id+'" style="display:none">'+renderLocationDetailHTML(loc)+'</div>'
    +'</div>'
  ).join('');
}

function toggleLocationDetail(locId) {
  const panel = document.getElementById('detail-panel-'+locId);
  const icon = document.getElementById('exp-'+locId);
  if(!panel) return;
  const isOpen = panel.style.display!=='none';
  // Close all
  document.querySelectorAll('[id^="detail-panel-"]').forEach(p=>{ p.style.display='none'; });
  document.querySelectorAll('[id^="exp-"]').forEach(i=>{ i.textContent='▶'; });
  if(!isOpen){
    panel.style.display='block';
    if(icon) icon.textContent='▼';
    openDetailId = locId;
    loadLocationComments(locId);
    // Pan map to marker
    const loc = currentLocations.find(l=>String(l.id)===String(locId));
    if(loc&&map) map.panTo([loc.lat,loc.lng]);
  } else {
    openDetailId=null;
  }
}

function renderLocationDetailHTML(loc) {

    html+='<div class="detail-section"><div class="detail-section-title">历史人文</div><div class="detail-section-content">'+escHtml(loc.description)+'</div></div>';
  }

    archItems.forEach(([v,l])=>{ html+='<div class="detail-info-item"><div class="detail-info-label">'+l+'</div><div class="detail-info-value">'+escHtml(v)+'</div></div>'; });

  }
  const practFields=[[loc.open_time,'开放时间'],[loc.ticket,'票价信息']];
  const practItems=practFields.filter(([v])=>v);
  if(practItems.length){
    html+='<div class="detail-section"><div class="detail-section-title">实用信息</div><div class="detail-info-grid">';
    practItems.forEach(([v,l])=>{ html+='<div class="detail-info-item"><div class="detail-info-label">'+l+'</div><div class="detail-info-value">'+escHtml(v)+'</div></div>'; });

  html+='<div class="detail-section"><div class="detail-section-title">地点评论</div><div id="loc-comments-'+loc.id+'"><div style="color:var(--text-gray);font-size:0.8rem">加载中...</div></div>';
  html+='<div class="add-comment" id="loc-add-comment-'+loc.id+'">';
  html+='<textarea id="loc-comment-text-'+loc.id+'" placeholder="写下您的感想..." style="width:100%;background:rgba(26,26,26,0.6);border:1px solid var(--border-color);color:var(--text-light);padding:0.6rem;font-family:\'Noto Sans SC\',sans-serif;font-size:0.82rem;resize:vertical;min-height:60px;margin-bottom:0.4rem"></textarea>';
  html+='<button onclick="addLocationComment(\''+loc.id+'\')" style="background:var(--accent-red);color:white;border:none;padding:0.45rem 1rem;font-family:\'Noto Sans SC\',sans-serif;font-weight:600;cursor:pointer;font-size:0.8rem">发表评论</button>';
  html+='</div></div></div>';
  return html;
}

async function loadLocationComments(locId) {
  const container = document.getElementById('loc-comments-'+locId);
  if(!container) return;
  if(!window.CommentSystem){ container.innerHTML='<div style="color:var(--text-gray);font-size:0.8rem">暂无评论</div>'; return; }
  const r = await CommentSystem.getComments(String(locId));
  const locComments = r.success ? (r.comments||r.data) : null;
  if(!locComments||locComments.length===0){
    container.innerHTML='<div style="color:var(--text-gray);font-size:0.8rem">暂无评论，来第一个发表吧！</div>';

  }
  container.innerHTML=locComments.map(c=>'<div class="comment"><div class="comment-header"><span class="comment-author">'+escHtml(c.author_name||'匿名')+'</span><span class="comment-date">'+(c.created_at?c.created_at.slice(0,10):'')+'</span></div><div class="comment-text">'+escHtml(c.text||c.content||'')+'</div></div>').join('');

async function addLocationComment(locId) {
  if(!currentUser){ showLoginModal(); return; }
  const ta = document.getElementById('loc-comment-text-'+locId);
  if(!ta||!ta.value.trim()){ alert('请输入评论内容'); return; }

// ===== TAB SWITCHING =====

  document.getElementById('panel-comments').style.display=tab==='comments'?'block':'none';

// ===== MAP COMMENTS =====
function setCommentRating(val) {
  selectedRating=val;
  const stars=document.querySelectorAll('.star-btn');
  stars.forEach((s,i)=>s.style.opacity=i<val?'1':'0.3');
}

async function loadMapComments() {
  const container=document.getElementById('mapCommentsList');
  if(!container) return;
  if(!currentMapId||!window.MapCommentSystem){ container.innerHTML=''; return; }
  const r=await MapCommentSystem.getComments(currentMapId);

async function submitMapComment() {
  if(!currentUser){ showLoginModal(); return; }
  const ta=document.getElementById('mapCommentText');
  if(!ta||!ta.value.trim()){ alert('请输入评论内容'); return; }

// ===== SAVE / UNSAVE =====
async function updateSaveButton() {
  const btn=document.getElementById('save-btn');
  if(!btn||!currentMapId) return;
  if(!currentUser||!window.MapSystem){ btn.textContent='🤍 收藏'; return; }
  const saved = await MapSystem.isSaved(currentMapId);
  btn.textContent=saved?'💛 已收藏':'🤍 收藏';
}

async function toggleSaveMap() {
  if(!currentUser){ showLoginModal(); return; }
  if(!currentMapId||!window.MapSystem) return;
  const saved = await MapSystem.isSaved(currentMapId);
  let result;
  if(saved) result=await MapSystem.unsaveMap(currentMapId);
  else result=await MapSystem.saveMap(currentMapId);
  if(result&&result.success) updateSaveButton();
  else if(result) alert(result.error||'操作失败');
}

<script>
// ===== CREATE MAP WIZARD =====
function initCreatePreviewMap() {
  if(mapPreview) return;
  mapPreview = L.map('create-map-preview',{zoomControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(mapPreview);
  mapPreview.setView([30.57,114.27],12);
  mapPreview.on('click',function(e){
    document.getElementById('wiz-loc-lat').value=e.latlng.lat.toFixed(6);
    document.getElementById('wiz-loc-lng').value=e.latlng.lng.toFixed(6);
  });
}

function wizardNext(step) {
  if(step===1){
    const title=document.getElementById('wiz-title').value.trim();
    if(!title){ alert('请填写地图名称'); return; }
    document.getElementById('wizard-step-1').classList.remove('active');
    document.getElementById('wizard-step-2').classList.add('active');
    document.getElementById('wiz-ind-1').classList.remove('active');
    document.getElementById('wiz-ind-2').classList.add('active');
    wizardStep=2;
    setTimeout(()=>{ if(!mapPreview) initCreatePreviewMap(); else mapPreview.invalidateSize(); },200);
  } else if(step===2){
    if(wizardLocations.length===0){ alert('请至少添加一个地点'); return; }
    document.getElementById('wizard-step-2').classList.remove('active');
    document.getElementById('wizard-step-3').classList.add('active');
    document.getElementById('wiz-ind-2').classList.remove('active');
    document.getElementById('wiz-ind-3').classList.add('active');
    wizardStep=3;
    renderWizardPreview();
  }
}

function wizardBack(step) {
  if(step===2){
    document.getElementById('wizard-step-2').classList.remove('active');
    document.getElementById('wizard-step-1').classList.add('active');
    document.getElementById('wiz-ind-2').classList.remove('active');
    document.getElementById('wiz-ind-1').classList.add('active');
    wizardStep=1;
  } else if(step===3){
    document.getElementById('wizard-step-3').classList.remove('active');
    document.getElementById('wizard-step-2').classList.add('active');
    document.getElementById('wiz-ind-3').classList.remove('active');
    document.getElementById('wiz-ind-2').classList.add('active');
    wizardStep=2;
  }
}

async function geocodeWizardAddress() {
  const addr=document.getElementById('wiz-loc-address').value.trim();
  if(!addr){ alert('请先输入地址'); return; }
  if(!window.GeocodingSystem){ alert('地理编码系统未就绪'); return; }
  const r=await GeocodingSystem.geocode(addr);
  if(r.success){
    document.getElementById('wiz-loc-lat').value=r.lat;
    document.getElementById('wiz-loc-lng').value=r.lng;
    if(mapPreview) mapPreview.setView([r.lat,r.lng],15);
  } else {
    alert('地址解析失败：'+r.error);
  }
}

function addWizardLocation() {
  const name=document.getElementById('wiz-loc-name').value.trim();
  const address=document.getElementById('wiz-loc-address').value.trim();
  const lat=parseFloat(document.getElementById('wiz-loc-lat').value);
  const lng=parseFloat(document.getElementById('wiz-loc-lng').value);
  if(!name){ alert('请填写地点名称'); return; }
  if(!address){ alert('请填写地址'); return; }
  if(isNaN(lat)||isNaN(lng)){ alert('请搜索坐标或点击地图选点'); return; }
  const loc={
    id:'tmp-'+Date.now(),
    name,address,lat,lng,
    description:document.getElementById('wiz-loc-desc').value.trim(),
    arch_style:document.getElementById('wiz-loc-arch-style').value.trim(),
    arch_year:document.getElementById('wiz-loc-arch-year').value.trim(),
    arch_builder:document.getElementById('wiz-loc-arch-builder').value.trim(),
    open_time:document.getElementById('wiz-loc-open-time').value.trim(),
    ticket:document.getElementById('wiz-loc-ticket').value.trim(),
    creator_notes:document.getElementById('wiz-loc-notes').value.trim()
  };
  wizardLocations.push(loc);
  ['wiz-loc-name','wiz-loc-address','wiz-loc-lat','wiz-loc-lng','wiz-loc-desc','wiz-loc-arch-style','wiz-loc-arch-year','wiz-loc-arch-builder','wiz-loc-open-time','wiz-loc-ticket','wiz-loc-notes'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  renderWizardLocationList();
  updateWizardPreview();
}

function removeWizardLocation(id) {
  wizardLocations=wizardLocations.filter(l=>l.id!==id);
  renderWizardLocationList();
  updateWizardPreview();
}

function renderWizardLocationList() {
  const list=document.getElementById('wiz-location-list');
  if(!list) return;
  list.innerHTML=wizardLocations.map((l,i)=>
    '<div class="wiz-loc-item">'
    +'<span class="location-number">'+(i+1)+'</span>'
    +'<div style="flex:1"><div class="wiz-loc-name">'+escHtml(l.name)+'</div><div class="wiz-loc-addr">'+escHtml(l.address)+'</div></div>'
    +'<button class="wiz-del-btn" onclick="removeWizardLocation(\''+l.id+'\')">删除</button>'
    +'</div>'
  ).join('');
}

function updateWizardPreview() {
  if(!mapPreview) return;
  mapPreview.eachLayer(layer=>{ if(layer instanceof L.Marker) mapPreview.removeLayer(layer); });
  wizardLocations.forEach((loc,idx)=>{
    const ic=L.divIcon({className:'',html:'<div style="background:var(--accent-red);color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.72rem;border:2px solid white">'+(idx+1)+'</div>',iconSize:[24,24],iconAnchor:[12,12]});
    L.marker([loc.lat,loc.lng],{icon:ic}).addTo(mapPreview).bindPopup(escHtml(loc.name));
  });
  if(wizardLocations.length>0){
    const bounds=L.latLngBounds(wizardLocations.map(l=>[l.lat,l.lng]));
    mapPreview.fitBounds(bounds,{padding:[30,30]});
  }
}

function renderWizardPreview() {
  const title=document.getElementById('wiz-title').value.trim();
  const desc=document.getElementById('wiz-desc').value.trim();
  const theme=document.getElementById('wiz-theme').value;
  const isPublic=document.getElementById('wiz-public').checked;
  const info=document.getElementById('wiz-preview-info');
  if(!info) return;
  info.innerHTML='<div class="wiz-preview-card">'
    +'<h3>'+escHtml(title)+'</h3>'
    +'<p>'+escHtml(desc||'（无描述）')+'</p>'
    +'<div class="wiz-preview-meta">'
    +'<span>主题：'+escHtml(theme)+'</span>'
    +'<span>地点数：'+wizardLocations.length+'</span>'
    +'<span>可见性：'+(isPublic?'公开':'私密')+'</span>'
    +'</div></div>';
}

async function publishMap() {
  if(!currentUser){ showLoginModal(); return; }
  if(!window.MapSystem||!window.MapLocationSystem){ alert('系统未就绪'); return; }
  const title=document.getElementById('wiz-title').value.trim();
  const desc=document.getElementById('wiz-desc').value.trim();
  const theme=document.getElementById('wiz-theme').value;
  const isPublic=document.getElementById('wiz-public').checked;
  const btn=document.querySelector('#wizard-step-3 .btn-primary');
  if(btn){ btn.disabled=true; btn.textContent='发布中...'; }
  const r=await MapSystem.createMap(title,desc,theme,isPublic);
  if(!r.success){ alert(r.error||'创建失败'); if(btn){btn.disabled=false;btn.textContent='发布地图 ✓';} return; }
  const mapId=(r.map&&r.map.id)||r.id;
  for(let i=0;i<wizardLocations.length;i++){
    const loc=wizardLocations[i];
    await MapLocationSystem.addLocation(mapId,{...loc,sort_order:i+1});
  }
  if(btn){ btn.disabled=false; btn.textContent='发布地图 ✓'; }
  alert('地图已发布！');
  wizardLocations=[];
  wizardStep=1;
  showView('home');
}

// ===== TOUR SYSTEM =====
const TOUR_STEPS=[
  {title:'欢迎来到历史印记！',content:'这是一个人文地图平台，你可以浏览他人创建的主题地图，也可以自己创建地图记录有意义的地方。让我们来看看如何使用吧！'},
  {title:'浏览地图广场',content:'这里展示了所有公开的地图。点击地图卡片可以进入地图详情页，查看地图上的所有地点。带有"🏛 示范地图"标记的是官方示例地图。'},
  {title:'查看地点详情',content:'进入地图后，点击左侧地图上的标记，或点击右侧"地点列表"中的任意地点，可以展开该地点的详细介绍，包括历史人文信息、建筑信息和实用信息。'},
  {title:'发表评论',content:'切换到"地图评论"标签，可以查看其他用户的评论，也可以发表自己对这张地图的感想和评分（需要登录）。'},
  {title:'收藏地图',content:'点击顶部的"收藏"按钮，可以将喜欢的地图收藏起来，方便下次快速找到（需要登录）。'},
  {title:'规划路线',content:'在地图详情页，点击地图右下角的"🗺 路线规划"按钮，可以选择想参观的地点，规划驾车、步行或公交路线。'},
  {title:'创建自己的地图',content:'点击导航栏的"创建地图"按钮，通过三步向导创建属于你自己的人文地图：填写基本信息、添加地点（支持地址搜索自动定位）、预览并发布。快去试试吧！'}
];

function startTour(){
  tourStep=0;
  document.getElementById('tour-overlay').style.display='flex';
  showTourStep(0);
}
function showTourStep(idx){
  const step=TOUR_STEPS[idx];
  if(!step) return;
  document.getElementById('tour-title').textContent=step.title;
  document.getElementById('tour-content').textContent=step.content;
  document.getElementById('tour-step-num').textContent='第 '+(idx+1)+' 步 / 共 '+TOUR_STEPS.length+' 步';
  document.getElementById('tour-prev').style.display=idx>0?'inline-block':'none';
  document.getElementById('tour-next').textContent=idx===TOUR_STEPS.length-1?'开始探索':'下一步';
}
function tourNext(){
  if(tourStep===TOUR_STEPS.length-1){ endTour(); return; }
  tourStep++;
  showTourStep(tourStep);
}
function tourPrev(){
  if(tourStep>0){ tourStep--; showTourStep(tourStep); }
}
function endTour(){
  document.getElementById('tour-overlay').style.display='none';
  localStorage.setItem('heritage_toured','1');
}
</script>

<script>
// ===== ROUTE PLANNING =====
function showRouteModal() {
  const modal=document.getElementById('routeModal');
  if(!modal) return;
  modal.style.display='flex';
  // Populate checkboxes
  const cb=document.getElementById('routeCheckboxes');
  if(cb){
    cb.innerHTML=currentLocations.map(l=>'<label><input type="checkbox" value="'+l.id+'" checked> '+escHtml(l.name)+'</label>').join('');
  }
  // Populate start/end selects
  ['startPoint','endPoint'].forEach(sid=>{
    const sel=document.getElementById(sid);
    if(!sel) return;
    sel.innerHTML='<option value="">请选择</option>'+currentLocations.map(l=>'<option value="'+l.id+'">'+escHtml(l.name)+'</option>').join('');
  });
  document.getElementById('routeResult').innerHTML='';
}

function toggleStartInput(){
  const t=document.querySelector('input[name="startType"]:checked');
  document.getElementById('startPoint').style.display=t&&t.value==='custom'?'none':'block';
  document.getElementById('customStartAddress').style.display=t&&t.value==='custom'?'block':'none';
}
function toggleEndInput(){
  const t=document.querySelector('input[name="endType"]:checked');
  document.getElementById('endPoint').style.display=t&&t.value==='custom'?'none':'block';
  document.getElementById('customEndAddress').style.display=t&&t.value==='custom'?'block':'none';
}

async function generateRoute(){
  const checkedBoxes=document.querySelectorAll('#routeCheckboxes input:checked');
  if(checkedBoxes.length===0){ alert('请至少选择一个游览地点'); return; }
  const selectedIds=Array.from(checkedBoxes).map(cb=>cb.value);
  let selLocs=currentLocations.filter(l=>selectedIds.includes(String(l.id)));

  // Get start and end
  const startType=document.querySelector('input[name="startType"]:checked');
  const endType=document.querySelector('input[name="endType"]:checked');
  let startLoc=null,endLoc=null;
  if(startType&&startType.value==='preset'){
    const sv=document.getElementById('startPoint').value;
    if(sv) startLoc=currentLocations.find(l=>String(l.id)===sv);
  } else {
    const addr=document.getElementById('customStartAddress').value.trim();
    if(addr&&window.GeocodingSystem){
      const r=await GeocodingSystem.geocode(addr);
      if(r.success) startLoc={name:addr,lat:r.lat,lng:r.lng};
    }
  }
  if(endType&&endType.value==='preset'){
    const ev=document.getElementById('endPoint').value;
    if(ev) endLoc=currentLocations.find(l=>String(l.id)===ev);
  } else {
    const addr=document.getElementById('customEndAddress').value.trim();
    if(addr&&window.GeocodingSystem){
      const r=await GeocodingSystem.geocode(addr);
      if(r.success) endLoc={name:addr,lat:r.lat,lng:r.lng};
    }
  }

  // Order locations
  const order=document.querySelector('input[name="routeOrder"]:checked');
  if(startLoc){
    selLocs.sort((a,b)=>{
      const da=calculateDistance(startLoc.lat,startLoc.lng,a.lat,a.lng);
      const db=calculateDistance(startLoc.lat,startLoc.lng,b.lat,b.lng);
      return order&&order.value==='farthest'?db-da:da-db;
    });
  }

  const result=document.getElementById('routeResult');
  result.innerHTML='<div style="color:var(--text-gray)">正在计算路线...</div>';

  // Build segments
  const allPoints=[];
  if(startLoc) allPoints.push(startLoc);
  allPoints.push(...selLocs);
  if(endLoc) allPoints.push(endLoc);

  if(allPoints.length<2){ result.innerHTML='<div style="color:var(--text-gray)">需要至少两个地点生成路线</div>'; return; }

  let totalDist=0;
  for(let i=0;i<allPoints.length-1;i++){
    totalDist+=calculateDistance(allPoints[i].lat,allPoints[i].lng,allPoints[i+1].lat,allPoints[i+1].lng);
  }

  // Draw straight-line route on map
  if(routeLayer){ routeLayer.remove(); routeLayer=null; }
  routeLayer=L.polyline(allPoints.map(p=>[p.lat,p.lng]),{color:'#d4af37',weight:3,dashArray:'8,4',opacity:0.8}).addTo(map);
  map.fitBounds(routeLayer.getBounds(),{padding:[30,30]});

  result.innerHTML='<div style="color:var(--accent-gold);font-weight:600;margin-bottom:0.8rem">游览路线（共'+allPoints.length+'个节点，预估距离 '+fmtDist(Math.round(totalDist))+'）</div>';

  // Generate transport options for each segment
  for(let i=0;i<allPoints.length-1;i++){
    const A=allPoints[i],B=allPoints[i+1];
    const segKey=i+'-';
    const segDiv=document.createElement('div');
    segDiv.className='route-segment';
    segDiv.innerHTML='<div class="route-segment-header">'+(i+1)+'. '+escHtml(A.name)+' → '+escHtml(B.name)+'</div>'
      +'<div>直线距离：'+fmtDist(Math.round(calculateDistance(A.lat,A.lng,B.lat,B.lng)))+'</div>'
      +'<div class="transport-options">'
      +'<button class="transport-btn" onclick="showTransportDetail(\''+i+'\',\'driving\',['+A.lat+','+A.lng+'],['+B.lat+','+B.lng+'])">🚗 驾车</button>'
      +'<button class="transport-btn" onclick="showTransportDetail(\''+i+'\',\'walking\',['+A.lat+','+A.lng+'],['+B.lat+','+B.lng+'])">🚶 步行</button>'
      +'<button class="transport-btn" onclick="showTransportDetail(\''+i+'\',\'transit\',['+A.lat+','+A.lng+'],['+B.lat+','+B.lng+'])">🚌 公交</button>'
      +'<button class="transport-btn" onclick="showTransportDetail(\''+i+'\',\'riding\',['+A.lat+','+A.lng+'],['+B.lat+','+B.lng+'])">🚲 骑行</button>'
      +'</div>'
      +'<div class="transport-detail" id="td-'+i+'"></div>';
    result.appendChild(segDiv);
  }
}

async function showTransportDetail(segIdx,mode,originArr,destArr){
  const container=document.getElementById('td-'+segIdx);
  if(!container) return;
  container.classList.add('visible');
  container.innerHTML='<div style="color:var(--text-gray);font-size:0.82rem">加载中 <span class="loading"></span></div>';
  if(!window.RoutePlanningSystem){ container.innerHTML='<div style="color:var(--text-gray)">路线规划系统未就绪</div>'; return; }
  const origin=new AMap.LngLat(originArr[1],originArr[0]);
  const dest=new AMap.LngLat(destArr[1],destArr[0]);
  let r;
  if(mode==='driving') r=await RoutePlanningSystem.drivingRoute(origin,dest);
  else if(mode==='walking') r=await RoutePlanningSystem.walkingRoute(origin,dest);
  else if(mode==='transit') r=await RoutePlanningSystem.transitRoute(origin,dest);
  else r=await RoutePlanningSystem.ridingRoute(origin,dest);

  if(!r.success){ container.innerHTML='<div style="color:var(--text-gray);font-size:0.82rem">'+escHtml(r.error||'获取失败')+'</div>'; return; }

  if(mode==='transit') container.innerHTML=renderTransitPlans(r.plans,segIdx);
  else {
    // Store steps per sid for drawTransportRouteById
    (r.routes||[]).forEach((route,i)=>{
      const sid=segIdx+'-'+mode+'-'+i;
      window._planSteps[sid]=route.steps||[];
    });
    container.innerHTML=renderDrivingPlans(r.routes,segIdx,mode);
  }
}

function renderDrivingPlans(routes,segIdx,mode){
  if(!routes||routes.length===0) return '<div style="color:var(--text-gray);font-size:0.82rem">无路线数据</div>';
  return routes.map((route,i)=>{
    const sid=segIdx+'-'+mode+'-'+i;
    const title=mode==='driving'?'驾车':mode==='walking'?'步行':'骑行';
    return '<div class="route-plan">'
      +'<div class="route-plan-header" onclick="togglePlanBody(\''+sid+'\')">'
      +'<span class="route-plan-title">'+title+'路线 '+(routes.length>1?'方案'+(i+1):'')+'</span>'
      +'<span class="route-plan-meta">'+fmtDist(route.distance)+' · '+fmtTime(route.duration)+(route.tolls?'（过路费¥'+route.tolls+'）':'')+'</span>'
      +'</div>'
      +'<div class="route-plan-body" id="pb-'+sid+'">'
      +'<div class="map-route-hint" onclick="drawTransportRouteById(\''+sid+'\')">🗺 在地图上显示</div>'
      +(route.steps&&route.steps.length?'<button class="steps-toggle-btn" onclick="toggleStepList(\'sl-'+sid+'\')">展开步骤</button><div class="steps-wrapper" id="sl-'+sid+'"><ul class="step-list">'+route.steps.map(s=>'<li class="step-item"><span class="step-dot"></span><span class="step-text">'+escHtml(s.instruction)+'</span><span class="step-dist">'+fmtDist(s.distance)+'</span></li>').join('')+'</ul></div>':'')
      +'</div></div>';
  }).join('');
}

function renderTransitPlans(plans,segIdx){
  if(!plans||plans.length===0) return '<div style="color:var(--text-gray);font-size:0.82rem">无公交方案</div>';
  return plans.map((plan,i)=>{
    const sid=segIdx+'-transit-'+i;
    return '<div class="route-plan">'
      +'<div class="route-plan-header" onclick="togglePlanBody(\''+sid+'\')">'
      +'<span class="route-plan-title">公交方案 '+(i+1)+'</span>'
      +'<span class="route-plan-meta">'+fmtDist(plan.distance)+' · '+fmtTime(plan.duration)+(plan.cost?'（¥'+plan.cost+'）':'')+'</span>'
      +'</div>'
      +'<div class="route-plan-body" id="pb-'+sid+'">'
      +(plan.segments||[]).map(seg=>{
        if(seg.type==='walk') return '<div class="transit-seg"><div class="transit-line"><div class="transit-dot walk-dot"></div><div class="transit-connector walk-connector"></div></div><div class="transit-info"><div class="transit-line-name walk-name">步行 '+fmtDist(seg.distance)+'</div></div></div>';
        return '<div class="transit-seg"><div class="transit-line"><div class="transit-dot"></div><div class="transit-connector"></div></div><div class="transit-info"><div class="transit-line-name">'+escHtml(seg.line||'')+'</div><div class="transit-stops">'+(seg.departure||'')+' → '+(seg.arrival||'')+(seg.via_stops?' 经过'+seg.via_stops+'站':'')+'</div></div></div>';
      }).join('')
      +'</div></div>';
  }).join('');
}

function togglePlanBody(sid){
  const el=document.getElementById('pb-'+sid);
  if(el) el.classList.toggle('open');
}
function toggleStepList(sid){
  const el=document.getElementById(sid);
  if(el) el.classList.toggle('open');
}

function drawTransportRouteById(sid){
  const steps=window._planSteps&&window._planSteps[sid];
  if(!steps){ return; }
  drawTransportRoute(steps,sid);
}

function drawTransportRoute(steps,sid){
  if(transportRouteLayer){ transportRouteLayer.remove(); transportRouteLayer=null; }
  const pts=[];
  (steps||[]).forEach(s=>{ (s.path||[]).forEach(p=>{ if(Array.isArray(p)&&p.length>=2) pts.push([p[1],p[0]]); }); });
  if(pts.length>0&&map){
    transportRouteLayer=L.polyline(pts,{color:'#4a9eff',weight:4,opacity:0.85}).addTo(map);
    map.fitBounds(transportRouteLayer.getBounds(),{padding:[30,30]});
  }
}
function clearTransportRoute(){
  if(transportRouteLayer){ transportRouteLayer.remove(); transportRouteLayer=null; }
}

// ===== INIT =====
window.onload = async function(){
  // Auto tour on first visit
  if(!localStorage.getItem('heritage_toured')){
    setTimeout(startTour,1200);
  }

  // Auth state via AuthSystem
  if(window.AuthSystem){
    AuthSystem.onAuthStateChange((user)=>{
      currentUser=user||null;
      renderAuthArea(currentUser);
    });
    const user = await AuthSystem.getCurrentUser();
    currentUser=user;
    renderAuthArea(currentUser);
  }

  // Load home page
  loadHomePage();

  // Handle hash
  const hash=window.location.hash;
  if(hash&&hash.startsWith('#map/')){
    const mid=hash.slice(5);
    if(mid) openMap(mid);
  }
};
</script>
